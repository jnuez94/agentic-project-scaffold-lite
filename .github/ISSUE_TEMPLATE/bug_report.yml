name: Bug report
description: Report an installer, coordination CLI, template, or specification defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, customer data, regulated data, or private coordination records.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Markdown installer
        - SQLite installer
        - Coordination CLI contract
        - SQLite schema
        - Concurrency or locking
        - Backup, restore, or recovery
        - Health or diagnostics
        - Codex skill
        - Specification
        - Templates
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal, non-sensitive steps.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include sanitized stdout, stderr, exit code, and diagnostic output when available.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Python version, installation path shape, and whether multiple local processes were active. Do not include private paths or data.
    validations:
      required: true
