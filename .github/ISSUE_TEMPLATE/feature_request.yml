name: Feature request
description: Propose a portable improvement to the working model
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What coordination problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior without assuming a specific agent harness.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This request contains no secrets, customer data, or regulated data.
          required: true
