name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Markdown installer
        run: make test
      - name: Validate Codex skill
        run: make validate-skill
      - name: Check local documentation links
        run: make check-links
      - name: Check shell syntax
        run: |
          sh -n scripts/install.sh
          sh -n scripts/verify-install.sh
          sh -n tests/install.sh
          sh -n tests/sqlite.sh
          python3 -m compileall -q coordination
          python3 -m py_compile scripts/check-markdown-links.py scripts/coordination.py scripts/validate-skill.py
